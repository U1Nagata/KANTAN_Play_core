name: Build Firmware

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'ota_bin/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e release_s3
