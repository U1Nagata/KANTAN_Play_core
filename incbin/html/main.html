<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KANTAN Play</title>
<link rel="stylesheet" href="https://ainyan03.github.io/KANTAN_Play_core/ui/app.css">
</head>
<body>
<div id="app" style="font-family:sans-serif;padding:16px">Loading…</div>
<script>
window.KANPLAY={api:location.origin};
setTimeout(function(){
  var a=document.getElementById('app');
  if(a&&a.firstChild&&a.firstChild.nodeType===3&&a.firstChild.nodeValue.indexOf('Loading')===0){
    a.innerHTML='<p>Failed to load the UI.<br>Please check your internet connection.</p>';
  }
},10000);
</script>
<script src="https://ainyan03.github.io/KANTAN_Play_core/ui/app.js" defer></script>
</body>
</html>
